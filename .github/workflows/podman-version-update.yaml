name: update podman version

on:
  # schedule:
  #   - cron: '0 0 * * *' # Every day at midnight UTC
  workflow_dispatch:
  push:
jobs:
  update-podman:
    runs-on: ubuntu-24.04

    steps:
      - name: checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Get current podman version
        id: get_current_version
        run: |
          CURRENT_VERSION=$(jq -r '.version' podman-desktop/extensions/podman/packages/extension/src/podman5.json)
          echo "CURRENT_VERSION=${CURRENT_VERSION}" >> $GITHUB_ENV

      - name: Fetch latest Podman release
        id: fetch_latest_podman_release
        run: |
          LATEST_PODMAN_RELEASE=$(curl -s https://api.github.com/repos/containers/podman/releases/latest)
          LATEST_VERSION=$(echo "$LATEST_PODMAN_RELEASE" | jq -r '.assets[].name')
          ASSETS=$(echo "$LATEST_PODMAN_RELEASE" | jq -r '.assets[].name')
          echo "LATEST_VERSION=${LATEST_VERSION} >> $GITHUB_ENV
          echo "$ASSETS" > assets.txt

      - name: Compare version numbers using semver
        id: compare_varsion_numbers
        run: |
          echo "Current version: $CURRENT_VERSION"
          echo "Latest version: $LATEST_VERSION"
          pnpm install semver
          node -e "
            const semver = require('semver');
            const currentVersion = process.env.CURRENT_VERSION;
            const latestVersion = process.env.LATEST_VERSION;
            if(semver.gt(latestVersion,currentVersion)) {
            console.log('New version available:', latestVersion);
          console.log('::set-env name=NEW_VERSION::' + latestVersion);
            } else {
              console.log('No new version available.');
            process.exit(0);
            }
          "
